<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta http-equiv="refresh" content="3600">
<title>TALON Intelligence Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#050810;--s1:#090d18;--s2:#0d1525;--border:rgba(99,179,237,0.12);--border2:rgba(99,179,237,0.25);--blue:#4f8ef7;--cyan:#22d3ee;--green:#34d399;--orange:#fb923c;--red:#f87171;--purple:#c084fc;--text:#dde4f0;--muted:#4a5878;--muted2:#6b7fa0;--mono:'JetBrains Mono',monospace;--sans:'Syne',sans-serif;}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--sans);background:var(--bg);color:var(--text);min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(99,179,237,0.025) 1px,transparent 1px),linear-gradient(90deg,rgba(99,179,237,0.025) 1px,transparent 1px);background-size:48px 48px;pointer-events:none;}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:var(--border2)}
a{color:var(--blue);text-decoration:none}a:hover{text-decoration:underline}

header{background:rgba(9,13,24,0.98);border-bottom:1px solid var(--border);padding:16px 28px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;backdrop-filter:blur(12px);}
.logo{display:flex;align-items:center;gap:12px}
.logo-badge{font-family:var(--mono);font-size:11px;color:var(--cyan);background:rgba(34,211,238,0.08);border:1px solid rgba(34,211,238,0.2);padding:5px 10px;letter-spacing:.1em;}
.logo h1{font-size:20px;font-weight:800;letter-spacing:.1em;background:linear-gradient(135deg,#fff 40%,var(--cyan));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.logo p{font-size:10px;color:var(--muted2);font-family:var(--mono);letter-spacing:.06em;}
.header-right{display:flex;align-items:center;gap:10px;font-family:var(--mono);font-size:10px;}
.status-pill{display:flex;align-items:center;gap:5px;color:var(--green);background:rgba(52,211,153,.08);border:1px solid rgba(52,211,153,.2);padding:4px 10px;}
.dot{width:5px;height:5px;background:var(--green);border-radius:50%;box-shadow:0 0 6px var(--green);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.nav-links{display:flex;gap:8px;}
.nav-link{font-family:var(--mono);font-size:10px;color:var(--muted2);background:var(--s2);border:1px solid var(--border);padding:4px 10px;letter-spacing:.06em;transition:all .2s;}
.nav-link:hover{color:var(--cyan);border-color:var(--border2);text-decoration:none;}

.main{padding:24px 28px;max-width:1400px;margin:0 auto;position:relative;z-index:1;}
.updated{font-family:var(--mono);font-size:10px;color:var(--muted);margin-bottom:20px;letter-spacing:.04em;}
.stale-warn{color:var(--orange);}

/* Stats grid */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px;margin-bottom:24px;}
.stat{background:var(--s1);border:1px solid var(--border);border-radius:12px;padding:16px;position:relative;overflow:hidden;transition:all .2s;}
.stat::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;border-radius:2px 2px 0 0;}
.stat:hover{transform:translateY(-2px);border-color:var(--border2);}
.stat.blue::before{background:linear-gradient(90deg,var(--blue),var(--cyan))}
.stat.cyan::before{background:linear-gradient(90deg,var(--cyan),var(--blue))}
.stat.purple::before{background:linear-gradient(90deg,var(--purple),var(--blue))}
.stat.orange::before{background:linear-gradient(90deg,var(--orange),#fbbf24)}
.stat.green::before{background:linear-gradient(90deg,var(--green),#2dd4bf)}
.stat.red::before{background:linear-gradient(90deg,var(--red),#f472b6)}
.stat-val{font-family:var(--mono);font-size:30px;font-weight:700;line-height:1;}
.stat.blue .stat-val{color:var(--blue)}.stat.cyan .stat-val{color:var(--cyan)}.stat.purple .stat-val{color:var(--purple)}.stat.orange .stat-val{color:var(--orange)}.stat.green .stat-val{color:var(--green)}.stat.red .stat-val{color:var(--red)}
.stat-lbl{font-size:11px;color:var(--muted2);margin-top:4px;font-family:var(--mono);letter-spacing:.04em;}

/* Grid layout */
.grid-2{display:grid;grid-template-columns:2fr 1fr;gap:20px;margin-bottom:20px;}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:20px;margin-bottom:20px;}
.section{background:var(--s1);border:1px solid var(--border);border-radius:14px;padding:20px;}
.section-title{font-size:10px;font-weight:600;color:var(--muted2);letter-spacing:.12em;text-transform:uppercase;font-family:var(--mono);display:flex;align-items:center;gap:8px;margin-bottom:16px;}
.section-title::after{content:'';flex:1;height:1px;background:var(--border);}

/* Job cards */
.job-card{background:var(--s2);border:1px solid var(--border);border-radius:8px;padding:14px 16px;margin-bottom:8px;display:flex;align-items:center;gap:12px;transition:all .2s;}
.job-card:hover{border-color:var(--border2);}
.job-title{font-size:14px;font-weight:600;color:var(--text);flex:1;}
.job-co{font-size:12px;color:var(--muted2);margin-right:auto;min-width:140px;}
.job-score{font-family:var(--mono);font-size:12px;padding:3px 10px;border-radius:10px;background:rgba(251,146,60,.1);color:var(--orange);border:1px solid rgba(251,146,60,.2);}
.job-link{font-family:var(--mono);font-size:11px;color:var(--cyan);}

/* News cards */
.news-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.news-card{background:var(--s2);border:1px solid var(--border);border-radius:10px;padding:14px;}
.news-label{font-family:var(--mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;margin-bottom:8px;}
.news-body{font-size:12.5px;color:#8899bb;line-height:1.7;white-space:pre-line;}

/* System status */
.sys-row{display:flex;justify-content:space-between;align-items:center;padding:10px;background:var(--s2);border-radius:8px;border:1px solid var(--border);margin-bottom:8px;}
.sys-name{font-family:var(--mono);font-size:11px;color:var(--muted2);}
.sys-pill{font-family:var(--mono);font-size:10px;color:var(--green);background:rgba(52,211,153,.1);border:1px solid rgba(52,211,153,.2);padding:2px 8px;border-radius:10px;}

/* Cost box */
.cost-big{font-family:var(--mono);font-size:38px;font-weight:700;color:var(--green);text-align:center;padding:16px;}
.cost-row{display:flex;justify-content:space-between;padding:10px;background:var(--s2);border-radius:8px;border:1px solid var(--border);margin-bottom:8px;font-size:13px;}
.cost-val{font-family:var(--mono);font-size:13px;font-weight:700;color:var(--text);}

.footer{text-align:center;padding:24px;color:var(--muted);font-size:10px;font-family:var(--mono);letter-spacing:.06em;border-top:1px solid var(--border);margin-top:24px;}

.loading{text-align:center;padding:80px;font-family:var(--mono);font-size:13px;color:var(--muted);}
.error{background:rgba(248,113,113,.08);border:1px solid rgba(248,113,113,.2);color:var(--red);padding:16px;border-radius:8px;font-family:var(--mono);font-size:12px;margin-bottom:20px;}

@media(max-width:900px){.grid-2,.grid-3{grid-template-columns:1fr}.news-grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<header>
  <div class="logo">
    <div class="logo-badge">T A L O N</div>
    <div><h1>INTELLIGENCE</h1><p>TACTICAL AUTOMATED LOGISTIC OPERATING NETWORK</p></div>
  </div>
  <div class="header-right">
    <div class="nav-links">
      <a href="https://thousif3.github.io" class="nav-link">← PORTFOLIO</a>
      <a href="https://thousif3.github.io/talon-chat/" class="nav-link">💬 CHAT</a>
    </div>
    <div class="status-pill"><div class="dot"></div>LIVE</div>
  </div>
</header>

<div class="main">
  <div id="app"><div class="loading">⟳ Loading TALON intelligence...</div></div>
</div>

<div class="footer">TALON v2.0 · Built by <a href="https://thousif3.github.io">Thousifuddin Shaik</a> · Auto-refreshes hourly</div>

<script>
const STATS_URL = 'https://thousif3.github.io/talon-stats/stats.json';

async function load() {
  try {
    const res = await fetch(STATS_URL + '?t=' + Date.now());
    const d   = await res.json();
    render(d);
  } catch(e) {
    document.getElementById('app').innerHTML = `<div class="error">⚠ Could not load TALON stats — ${e.message}</div>`;
  }
}

function render(d) {
  const p   = d.pipeline;
  const n   = d.recentNews || {};
  const j   = d.topJobs || [];
  const age = d.generatedAt ? Math.floor((Date.now() - new Date(d.generatedAt)) / 3600000) : null;
  const stale = age !== null && age > 24;

  const stats = [
    {val:p.jobsScanned, lbl:'Jobs Scanned', cls:'blue'},
    {val:p.eligible,    lbl:'Eligible',     cls:'cyan'},
    {val:p.score7plus,  lbl:'Score 7+',     cls:'purple'},
    {val:p.approved,    lbl:'Approved',     cls:'orange'},
    {val:p.applications,lbl:'Applications', cls:'blue'},
    {val:p.interviews,  lbl:'Interviews',   cls:'orange'},
    {val:p.rejections,  lbl:'Rejections',   cls:'red'},
    {val:p.crmTracked,  lbl:'CRM Tracked',  cls:'green'},
  ];

  const statsHTML = stats.map(s => `
    <div class="stat ${s.cls}">
      <div class="stat-val">${s.val}</div>
      <div class="stat-lbl">${s.lbl}</div>
    </div>`).join('');

  const jobsHTML = j.length > 0 ? j.map(job => `
    <div class="job-card">
      <div>
        <div class="job-title">${job.title}</div>
        <div class="job-co" style="margin-top:3px">${job.company} · ${job.location}</div>
      </div>
      <div class="job-score">${job.score}/10</div>
      <a href="${job.url}" target="_blank" class="job-link">View →</a>
    </div>`).join('') : '<div style="color:var(--muted);font-size:13px;padding:16px;text-align:center;">Scan running at 8AM/8PM ET</div>';

  const newsItems = [
    {icon:'🔴', label:'Breaking', color:'#ef4444', text:n.breaking},
    {icon:'🛂', label:'Visa & Immigration', color:'#ec4899', text:n.visa},
    {icon:'💻', label:'Tech & Hiring', color:'#8b5cf6', text:n.tech},
  ];
  const newsHTML = newsItems.filter(ni => ni.text).map(ni => `
    <div class="news-card">
      <div class="news-label" style="color:${ni.color}">${ni.icon} ${ni.label}</div>
      <div class="news-body">${ni.text.slice(0,280)}${ni.text.length > 280 ? '...' : ''}</div>
    </div>`).join('');

  const services = ['talon-scheduler','talon-dashboard','talon-discord','talon-report','talon-n8n'];
  const sysHTML = services.map(s => `
    <div class="sys-row">
      <span class="sys-name">${s}</span>
      <span class="sys-pill">● ONLINE</span>
    </div>`).join('');

  document.getElementById('app').innerHTML = `
    ${stale ? `<div class="error">⚠ Data is ${age}h old — TALON may be offline</div>` : ''}
    <div class="updated">// LAST UPDATED: ${d.generatedAtET} ET · AUTO-REFRESH 1HR ${stale ? '<span class="stale-warn">· ⚠ STALE</span>' : '· ✓ FRESH'}</div>

    <div class="stats-grid">${statsHTML}</div>

    <div class="grid-2">
      <div class="section">
        <div class="section-title">⭐ Top Job Matches</div>
        ${jobsHTML}
      </div>
      <div>
        <div class="section" style="margin-bottom:16px">
          <div class="section-title">⚡ System Status</div>
          ${sysHTML}
        </div>
        <div class="section">
          <div class="section-title">💰 AI Costs</div>
          <div class="cost-big">$${(d.aiCosts?.totalSpent || 0).toFixed(4)}</div>
          <div class="cost-row"><span style="color:var(--muted2)">Total API Calls</span><span class="cost-val">${d.aiCosts?.totalCalls || 0}</span></div>
          <div class="cost-row"><span style="color:var(--muted2)">Primary Model</span><span class="cost-val" style="color:var(--cyan);font-size:11px;">gemini-2.5-flash</span></div>
          <div class="cost-row"><span style="color:var(--muted2)">Tier</span><span class="cost-val" style="color:var(--green)">FREE</span></div>
        </div>
      </div>
    </div>

    <div class="section">
      <div class="section-title">📰 Latest Intel</div>
      <div class="news-grid">${newsHTML || '<div style="color:var(--muted);font-size:13px;">No news data yet</div>'}</div>
    </div>`;
}

load();
</script>
</body>
</html>
